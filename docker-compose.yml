x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  image: cs2-app:latest
  restart: unless-stopped
  stop_grace_period: 30s
  env_file: .env
  environment:
    LOG_DIR: /app/logs
    PYTHONUNBUFFERED: "1"
  volumes:
    - app_data:/app/data
    - ./logs/app:/app/logs
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend

services:
  # ── TimescaleDB (PostgreSQL 16) ───────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${DB_PORT:-5432}:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cs2}
      POSTGRES_USER: ${POSTGRES_USER:-cs2user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cs2pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./logs/db:/var/log/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cs2user} -d ${POSTGRES_DB:-cs2}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (FastAPI + uvicorn) ───────────────────────────────────────────────────
  api:
    <<: *app
    command: ["api"]
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── UI (Dash dashboard) ───────────────────────────────────────────────────────
  ui:
    <<: *app
    command: ["ui"]
    ports:
      - "${DASHBOARD_PORT:-8050}:8050"

  # ── Scrapper (one-shot market sync) ──────────────────────────────────────────
  scrapper:
    <<: *app
    command: ["scrapper"]
    restart: "no"

  # ── Worker (Celery background tasks) ─────────────────────────────────────────
  worker:
    <<: *app
    command: ["worker"]

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local
